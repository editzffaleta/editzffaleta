name: Gerar cards de estatísticas (pt-BR)

on:
  schedule:
    # Roda a cada 12 horas para manter os dados atualizados
    - cron: "30 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  cards:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Gerar os cards (github-profile-summary-cards)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Se o secret SUMMARY_GITHUB_TOKEN (PAT com escopo "repo") existir,
          # os cards passam a incluir dados dos repositórios privados.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: -3
          AUTO_PUSH: false

      - name: Manter apenas o tema tokyonight
        run: |
          find profile-summary-card-output -mindepth 1 -maxdepth 1 -type d ! -name tokyonight -exec rm -rf {} +

      - name: Traduzir os textos dos cards para português
        run: |
          sed -i \
            -e 's/contributions in the last year/contribuições no último ano/g' \
            -e 's/Contributions on GitHub/Contribuições no GitHub/g' \
            -e 's/Contributions in /Contribuições em /g' \
            -e 's/1 Contribuições/1 Contribuição/g' \
            -e 's/Public Repos/Repositórios Públicos/g' \
            -e 's/1 Repositórios Públicos/1 Repositório Público/g' \
            -e 's/Joined GitHub \(.*\) ago/No GitHub há \1/g' \
            -e 's/há a year/há um ano/g' \
            -e 's/há \([0-9]*\) years/há \1 anos/g' \
            -e 's/há a month/há um mês/g' \
            -e 's/há \([0-9]*\) months/há \1 meses/g' \
            -e 's/há a day/há um dia/g' \
            -e 's/há \([0-9]*\) days/há \1 dias/g' \
            -e 's/Top Languages by Repo/Linguagens por Repositório/g' \
            -e 's/Top Languages by Commit/Linguagens por Commit/g' \
            -e 's/There are no/Não há/g' \
            -e 's/any commits/nenhum commit/g' \
            -e 's/in the last year/no último ano/g' \
            -e 's/per day hour/por hora do dia/g' \
            -e 's/Total Stars Earned/Total de estrelas/g' \
            -e 's/Total Commits/Total de commits/g' \
            -e 's/Total PRs/Total de PRs/g' \
            -e 's/Total Issues/Total de issues/g' \
            -e 's/Contributed to/Contribuiu para/g' \
            -e 's/>Stats</>Estatísticas</g' \
            profile-summary-card-output/tokyonight/*.svg

      - name: Commitar e enviar os cards traduzidos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output
          git commit -m "chore: atualiza cards de estatísticas (pt-BR)" || echo "Nada para commitar"
          git push
